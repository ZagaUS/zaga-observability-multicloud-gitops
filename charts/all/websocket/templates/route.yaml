{{- if .Values.websocket.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Chart.Name }}-rt
  labels:
    app: {{ .Chart.Name }}
spec:
  subdomain: {{ .Values.route.subdomainName }}
  to:
    kind: Service
    name: {{ .Chart.Name }}-sv
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Allow
  wildcardPolicy: None
{{- end }}