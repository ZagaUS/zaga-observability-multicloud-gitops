kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Chart.Name }}-role
rules:
  - verbs:
      - get
      - list
      - watch
    apiGroups:
      - ''
    resources:
      - events
  - verbs:
      - get
      - list
      - watch
    apiGroups:
      - quota.openshift.io
    resources:
      - clusterresourcequotas
  - verbs:
      - get
      - list
      - watch
    apiGroups:
      - config.openshift.io
    resources:
      - infrastructures
      - infrastructures/status
  - verbs:
      - get
    apiGroups:
      - ''
    resources:
      - nodes/stats
      - nodes/proxy