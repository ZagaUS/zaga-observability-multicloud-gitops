
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.clusterRoleBinding.name | default "infra-otel-rb" }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default "infra-otel-collector" }}
    namespace: {{ .Values.serviceAccount.namespace | default "observability-otel" }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.clusterRole.name | default "infra-otel-role" }}
