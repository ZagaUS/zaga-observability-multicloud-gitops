#podpower collector

replicas: 1
image: 'ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.107.0'
# defined for spec

mode: deployment


# reciver config

receiver:
  grpcEndpoint: 0.0.0.0:4317
  httpEndpoint: 0.0.0.0:4318


# exporter config
exporters:
  kafka:
    enabled: true
    containerTopic: containerpowerlevel
    nodeTopic: nodepowerlevel
    brokers: telemetry-kafka-bootstrap.observability-kafka.svc.cluster.local:9092
    version: 3.4.0
    max_message_bytes: 9000000
    encoding: otlp_json


containerExporter:
  enabled: true

nodeExporter:
  enabled: true








