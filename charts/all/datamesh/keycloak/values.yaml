kc:
  enabled: true

postgres:
  enabled: true

###################
keycloak:
  replicaCount: 1

  image:
    repository: "quay.io/osclimate/keycloak"
    tag: "22.0.1"

  strategy:
    type: {}

  service:
    type: ClusterIP

  route:
    subdomain: keycloak

  securityContext: {}

  postgresDbSecret:
    data:
      POSTGRESQL_HOST: keycloakdb
      POSTGRESQL_USER: keycloak
      POSTGRESQL_PASSWORD: keycloak123$
      POSTGRESQL_DB_NAME: keycloakdb
      POSTGRESQL_PORT: "5432"
    type: Opaque

  adminSecret:
    data:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123$
    type: Opaque

  keystores:
    data:
      - name: tls.crt
        path: configs/keystores/tls.crt
      - name: tls.key
        path: configs/keystores/tls.key
    type: kubernetes.io/tls

  realms:
    data:
      - name: zaga-observability-realms.json
        path: configs/realms/zaga-observability-realms.json
    type: Opaque

  probes:
    readiness:
        httpGet:
          path: /health/ready
          port: 8443
          scheme: HTTPS
        initialDelaySeconds: 60
        timeoutSeconds: 1
        periodSeconds: 10
        successThreshold: 2
        failureThreshold: 3
    liveness:
        httpGet:
          path: /health/live
          port: 8443
          scheme: HTTPS
        initialDelaySeconds: 45
        timeoutSeconds: 1
        periodSeconds: 30
        successThreshold: 1
        failureThreshold: 12


###################################################################

keycloakdb: 

  replicaCount: 1

  image:
    repository: "quay.io/osclimate/postgresql-13"
    tag: "1-101"

  strategy:
    type: {}

  service:
    type: ClusterIP

  securityContext: {}

  secretEnv:
    data:
      POSTGRESQL_USER: keycloak
      POSTGRESQL_PASSWORD: keycloak123$
      POSTGRESQL_DATABASE: keycloakdb
      POSTGRESQL_ADMIN_PASSWORD: admin123$
    type: Opaque

  volumes:
    storageSize: 2Gi
    accessModes:
      - ReadWriteOnce