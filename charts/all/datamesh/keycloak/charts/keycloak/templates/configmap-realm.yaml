{{- if .Values.kc.enabled }}

apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ .Chart.Name }}-realms-configmap
  labels:
    app: {{ .Chart.Name }}

data:
  {{- range .Values.realms.data }}
    {{- if and .name .path }}
    {{ .name }}: |
      {{ $.Files.Get .path | nindent 8 | trimSuffix "\n" }}
    {{- end }}
  {{- end }}

{{- end }}