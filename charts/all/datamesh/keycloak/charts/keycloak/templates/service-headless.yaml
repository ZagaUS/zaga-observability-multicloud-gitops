{{- if .Values.kc.enabled }}

apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-headless
  labels:
    app: {{ .Chart.Name }}
spec:

  clusterIP: None

  ports:

  - name: https
    protocol: TCP
    port: 8443
    targetPort: 8443

  clusterIPs:
    - None

  selector:
    app: {{ .Chart.Name }}

{{- end }}