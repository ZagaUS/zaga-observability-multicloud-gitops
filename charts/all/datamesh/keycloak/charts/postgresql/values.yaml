replicaCount: 1

image:
  repository: "quay.io/osclimate/postgresql-13"
  tag: "1-101"

strategy:
  type: {}

service:
  type: ClusterIP

securityContext: {}

secretEnv:
  data:
    POSTGRESQL_USER: keycloak
    POSTGRESQL_PASSWORD: keycloak123$
    POSTGRESQL_DATABASE: keycloakdb
    POSTGRESQL_ADMIN_PASSWORD: admin123$
  type: Opaque

volumes:
  storageSize: 2Gi
  accessModes:
    - ReadWriteOnce

postgres:
  enabled: true