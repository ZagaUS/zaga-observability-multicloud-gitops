replicaCount: 1

image:
  repository: redis/redis-stack-server
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 6379

loadBalancerService:
  enabled: true  # Set to false to use ClusterIP
  loadBalancerIP: ""  # Optional: Add a static IP if required

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

nodeSelector: {}
tolerations: []
affinity: {}
